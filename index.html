<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Party Swipe 🔥</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>🔥 Party Swipe</h1>

  <div class="controls">
    <select id="game">
      <option value="verdad">Verdad o Shot</option>
      <option value="reto">Verdad o Reto</option>
      <option value="nunca">Yo Nunca Nunca</option>
    </select>

    <select id="level">
      <option value="suave">Suave 😇</option>
      <option value="medio">Medio 😏</option>
      <option value="alto">Alto 🔥</option>
    </select>
  </div>

  <div class="swipe-container">
    <div class="card" id="card">
      <p id="question">Cargando...</p>
    </div>
  </div>

  <div class="buttons">
    <button id="skip">⬅️ Pasar</button>
    <button id="next">➡️ Siguiente</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
