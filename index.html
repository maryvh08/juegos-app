<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Party Games 🔥</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🔥 Party Games</h1>

  <div class="controls">
    <select id="game">
      <option value="verdad">Verdad o Shot</option>
      <option value="reto">Verdad o Reto</option>
      <option value="nunca">Yo Nunca Nunca</option>
    </select>

    <select id="level">
      <option value="suave">Suave 😇</option>
      <option value="medio">Medio 😏</option>
      <option value="alto">Alto 🔥</option>
    </select>
  </div>

  <div class="card" id="card">
    <p id="question">Presiona "Siguiente" para empezar</p>
  </div>

  <button id="nextBtn">Siguiente</button>
</div>

<script src="app.js"></script>
</body>
</html>
