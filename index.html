<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Party Swipe</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SETUP -->
  <h1>🔥 Party Swipe</h1>
  
  <section class="setup" id="setup">
    <div class="card setup-card">
      
  <h2>👥 Jugadores</h2>

  <input id="playerInput" type="text" placeholder="Nombre del jugador">

  <button id="addPlayer">Agregar</button>

  <div id="playersList" class="players-list"></div>

  <button id="resetAll" class="danger">
    🧹 Reiniciar todo
  </button>
      
  <button id="startGame" class="primary">
    🚀 Empezar
  </button>

</div>

  </section>

  <!-- SELECT GAME -->

  <section id="gameSelector" class="selector hidden">
    <h2>🎴 Elige el juego</h2>

<button id="backHome" class="back home">🏠 Inicio</button>

<div class="cards">
  <div class="select-card verdad" data-game="verdad_shot">Verdad o Shot</div>
  <div class="select-card reto" data-game="verdad_reto">Verdad o Reto</div>
  <div class="select-card nunca" data-game="nunca">Yo nunca nunca</div>
</div>

  </section>

  <!-- SELECT LEVEL -->

  <section id="levelSelector" class="selector hidden">
    <h2>🎚️ Nivel</h2>

<div class="cards">
  <div class="select-card suave" data-level="suave">🟢 Suave</div>
  <div class="select-card medio" data-level="medio">🟡 Medio</div>
  <div class="select-card alto" data-level="alto">🔴 Alto</div>
</div>

  </section>

  <!-- GAME -->

  <main class="game hidden" id="gameUI">

<!-- ✅ HEADER SOLO EN EL JUEGO -->
<header class="header">
  <h1>🔥 Party Swipe</h1>

  <div class="hud">
    <div id="currentPlayer">Turno: -</div>
  </div>
</header>

<section class="swipe-container">
  <button id="backMenu" class="back">⬅ Juegos</button>
</section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
