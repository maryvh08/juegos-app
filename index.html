<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Party Swipe 🔥</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <h1>🔥 Party Swipe</h1>

    <div class="hud">
      <div id="currentPlayer">Turno: -</div>
      <div id="shots">🍻 0</div>
      <div id="streak">🔥 0</div>
    </div>
  </header>

  <!-- SETUP -->
  <section class="setup" id="setup">

    <div class="card setup-card">

      <h2>👥 Jugadores</h2>

      <input
        id="playerInput"
        type="text"
        placeholder="Nombre del jugador"
        autocomplete="off"
      />

      <button id="addPlayer">Agregar jugador</button>

      <div id="playersList" class="players-list"></div>

      <button id="startGame" class="primary">
        🚀 Iniciar juego
      </button>

    </div>

  </section>

  <!-- GAME -->
  <main class="game hidden" id="gameUI">

    <!-- CONTROLES -->
    <div class="controls">

      <select id="game">
        <option value="verdad">Verdad</option>
        <option value="reto">Reto</option>
        <option value="nunca">Nunca</option>
      </select>

      <select id="level">
        <option value="suave">Suave 😇</option>
        <option value="medio">Medio 😏</option>
        <option value="alto">Alto 🔥</option>
      </select>

    </div>

    <!-- SWIPE AREA -->
    <section class="swipe-container">

      <!-- BACK CARDS (depth effect) -->
      <div class="card layer3"></div>
      <div class="card layer2"></div>

      <!-- MAIN CARD -->
      <div class="card active" id="card">

        <p id="question">
          Cargando...
        </p>

        <!-- BADGES -->
        <div class="badge like" id="likeBadge">✔</div>
        <div class="badge skip" id="skipBadge">✖</div>

      </div>

    </section>

    <!-- ACTION BUTTONS -->
    <footer class="buttons">

      <button id="skip" aria-label="Rechazar">
        ⬅️
      </button>

      <button id="shot" aria-label="Tomar shot" class="danger">
        🍻
      </button>

      <button id="accept" aria-label="Aceptar">
        ➡️
      </button>

    </footer>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
