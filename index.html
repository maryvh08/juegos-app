<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>🔥 Party Swipe</title>

  <!-- Font moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app">

  <!-- =========================
       SETUP
  ========================== -->
  <section class="setup" id="setup">

    <h1>🔥 Party Swipe</h1>
  
    <div class="setup-wrapper">
  
      <div class="setup-block">
        <h2>👥 Jugadores</h2>

        <div class="input-row">
          <input id="playerInput" type="text" placeholder="Nombre del jugador" />
          <button id="addPlayer">➕</button>
        </div>
      </div>
  
      <div class="setup-block">
        <h3>Lista actual</h3>
        <div id="playersList" class="players-list"></div>
      </div>
  
      <div class="setup-block actions">
        <button id="startGame" class="primary full">
          🚀 Empezar juego
        </button>

        <button id="resetAll" class="danger full">
          🧹 Reiniciar todo
        </button>
      </div>
  
    </div>
  
  </section>

  <!-- =========================
       SELECT GAME
  ========================== -->
  <section id="gameSelector" class="selector hidden">

    <button id="backHome" class="back">🏠 Inicio</button>

    <h2>🎴 Elige el juego</h2>

    <div class="cards">

      <div class="select-card verdad" data-game="verdad_shot">
        Verdad o Shot
      </div>

      <div class="select-card reto" data-game="verdad_reto">
        Verdad o Reto
      </div>

      <div class="select-card nunca" data-game="nunca">
        Yo nunca nunca
      </div>

    </div>
  </section>

  <!-- =========================
       SELECT LEVEL
  ========================== -->
  <section id="levelSelector" class="selector hidden">

    <h2>🎚️ Nivel</h2>

    <div class="cards">

      <div class="select-card suave" data-level="suave">
        🟢 Suave
      </div>

      <div class="select-card medio" data-level="medio">
        🟡 Medio
      </div>

      <div class="select-card alto" data-level="alto">
        🔴 Alto
      </div>

    </div>
  </section>

  <!-- =========================
       GAME UI (CORRECTO)
  ========================== -->
  <main class="game hidden" id="gameUI">

    <!-- HEADER ÚNICO -->
    <header class="header">

      <div class="top-bar">
        <button id="backMenu" class="back">⬅ Juegos</button>
        <h1>🍷 Party Swipe</h1>
      </div>

      <div class="hud">
        <div id="currentPlayer">Turno: -</div>
      </div>

    </header>

    <!-- SWIPE AREA -->
    <section class="swipe-container">
      <!-- cards dinámicas aquí -->
    </section>

    <!-- MODE SELECTOR -->
    <section id="modeSelector" class="mode-selector hidden">

      <h2>Elige una opción</h2>

      <div class="mode-buttons">
        <button id="chooseTruth" class="mode truth">🤍 Verdad</button>
        <button id="chooseDare" class="mode dare">🔥 Reto</button>
      </div>

    </section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
